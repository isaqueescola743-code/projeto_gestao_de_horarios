<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Horários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestor de Horários de Professores</h1>

    <div class="container">
        <section id="adicionar">
            <h2>Adicionar Aula</h2>
            <form id="form-aula">
                <label>Turma:
                    <select id="select-turma" required></select>
                </label>
                <label>Disciplina:
                    <select id="select-disciplina" required></select>
                </label>
                <label>Professor:
                    <select id="select-professor" required>
                        <option value="">Carregando...</option>
                    </select>
                </label>
                <label>Dia:
                    <select id="select-dia">
                        <option>Segunda</option>
                        <option>Terça</option>
                        <option>Quarta</option>
                        <option>Quinta</option>
                        <option>Sexta</option>
                    </select>
                </label>
                <label>Hora:
                    <select id="select-hora">
                        <option>08:00-09:00</option>
                        <option>09:00-10:00</option>
                        <option>10:00-11:00</option>
                        <option>11:00-12:00</option>
                    </select>
                </label>
                <button type="submit">Agendar Aula</button>
            </form>
        </section>

        <section id="horarios">
            <h2>Grade de Horários</h2>
            <table id="tabela-horarios">
                <thead>
                    <tr>
                        <th>Hora / Dia</th>
                        <th>Segunda</th>
                        <th>Terça</th>
                        <th>Quarta</th>
                        <th>Quinta</th>
                        <th>Sexta</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
